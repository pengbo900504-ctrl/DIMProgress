name: Build iOS Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          git clone https://github.com/theos/theos.git /opt/theos
          echo "THEOS=/opt/theos" >> $GITHUB_ENV
          echo "PATH=/opt/theos/bin:$PATH" >> $GITHUB_ENV
          
      - name: Extract Source
        run: |
          unzip -o DIMProgress-Source.zip
          ls -la
          
      - name: Build and Package
        run: |
          ls -la DIMProgress-Source/
          cd DIMProgress-Source
          make clean
          make
          make package
          
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: DIMProgress-deb
          path: DIMProgress-Source/packages/*.deb
