name: Build iOS Tweak

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Install Theos
        run: |
          brew install make
          git clone https://github.com/theos/theos.git /opt/theos
          echo 'export THEOS=/opt/theos' >> $GITHUB_ENV
          echo 'export PATH=$PATH:/opt/theos/bin' >> $GITHUB_ENV
      
      - name: Build and Package
        run: |
          cd DIMProgress-Source
          unzip -o DIMProgress-Source.zip
          make clean
          make
          make package
      
      - name: Upload Package
        uses: actions/upload-artifact@v4
        with:
          name: DIMProgress-deb
          path: DIMProgress-Source/*.deb
